<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JSON Studio</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>

<header class="pop-head">
  <div class="brand">
    <div class="dot">{ }</div>
    <div class="word">JSON <span>Studio</span></div>
  </div>
  <a class="site-link" href="https://json.msdevbuild.com/" target="_blank" rel="noopener" title="Open the site">↗</a>
</header>

<div class="search-wrap">
  <input type="text" id="q" placeholder="Search tools…" autocomplete="off" autofocus>
</div>

<div class="paste-wrap">
  <textarea id="paste" rows="3" spellcheck="false" placeholder="Optional: paste JSON here to open it directly in the tool you pick."></textarea>
</div>

<nav id="list" class="list"></nav>

<footer class="pop-foot">
  <span>Runs in your browser · nothing uploaded</span>
</footer>

<script src="popup.js"></script>
</body>
</html>
